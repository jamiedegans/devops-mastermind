name: Python Lint
on: [push, pull_request]
jobs:
  lint:
      runs-on: ubuntu-latest
      steps:
        - name: check code
          uses: actions/checkout@v3

        - name: Set up Pyhton
          uses: actions/setup-python@v5
          with:
            python version: '3.11'
        - name: install dependencies
          run: |
            python -m pip install --upgrade pip
            pip install flake8
        - name: run flake8
          run: flake8 master_Mind.py
          
